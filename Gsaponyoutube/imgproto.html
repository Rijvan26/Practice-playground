<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <style>
            *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        html,body {
            height: 100%;
            width: 100%;
            background: #000;
            color: white;
           
        }

        header {
            position:fixed;
            height: 70px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
        }

        header .logo {
            text-transform: capitalize;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 30px;
            font-weight: 500;
        }

        .links  {
            display: flex;
            gap: 30px;
            font-weight: 400;
            font-size: 18px;
            z-index: 999;
            cursor: pointer;
        }

        .links h4 {
            position: relative;
            gap: 30px;
        }

        .links h4::before {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            background-color: #fff;
            z-index: -1;
            border-radius: 10px;
            transition: all 0.3s ease;
            bottom: -4px;
            left: 0;
        }

        .links h4:hover::before {
            width: 100%;
        }

        .img-innergroup img {
             height: 450px;
             position: absolute;
             width: 330px;
             opacity: 0;
        }


        .bottomtext h5 {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            text-transform: uppercase;
            font-weight: 400;
            margin-top: 30px;
        }

        main {
            position: absolute;
            top: 10%;
            height: 100dvh;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
      main h1 span {
        font-size: 126px;
        line-height: 120px;
        font-weight: 400;
        display:inline-block;
      }

    

      .texttab .Photographer {
            position: relative;
            overflow: hidden;
            height: 120px;
      }

      .texttab .Photographer::before {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        cursor: pointer;
        width: 0;
        height: 3px;
        background-color:#fff ;
        border-radius: 10px;
        transition: 0.5s ease;
      }

       .texttab .Photographer:hover::before {
        width: 100%;
       }
    </style>

</head>
<body>
    <header>
      <h4 class="logo">StreetPhotos</h4>
      <div class="links">
        <h4>Home</h4>
        <h4>About</h4>
        <h4>Photos</h4>
      </div>
    </header>
    <main>
        <h1 class="texttab">
            <span class="hello">Hello, I'am</span><br>
            <span class="iam">A Portraits</span><br>
            <span class="Photographer">Photographer</span>
        </h1>
        <div class="img-group">
            <div class="img-innergroup">
                <img src="https://i.pinimg.com/736x/f0/ad/59/f0ad59f31fd6a280a90b736e2d1769cc.jpg" alt="">
                <img src="https://i.pinimg.com/736x/f2/8e/e3/f28ee3a29f71df55d98f45859bd779e2.jpg" alt="">
                <img src="https://i.pinimg.com/736x/6c/89/a7/6c89a713ebc9f4358d3b017e17d890cb.jpg" alt="">
                <img src="https://i.pinimg.com/736x/af/57/f0/af57f078cf38596a201cc93958cc0ed3.jpg" alt="">
            </div>
        </div>
        <div class="bottomtext">
            <h5>American Photographer and Musician</h5>
        </div>
        
    </main>

    <script>

        var photoh1 = document.querySelector('.Photographer ')
        var photoh1text = photoh1.textContent
        var photoh1textsplited = photoh1text.split("")
        var halfvalue = photoh1text.length/2
       var clutter = "";

photoh1textsplited.forEach(function (e,idx) {
 
  
  if(idx<halfvalue){
    clutter += `<span class="a">${e}</span>`
  } else {
    clutter += `<span class="b">${e}</span>`
  }
});

console.log(clutter);
photoh1.innerHTML = clutter;
        var tl = gsap.timeline()

        tl.from('.texttab ', {
            x:-50,
            opacity:0,
            duration:1,
            delay:1,
            stagger:.15,
        })
        
        tl.from ('.a' ,{
         y:50,
            opacity:0,
         duration:1,
         // delay:1,
         stagger:.14,
     })

       tl.from ('.b' ,{
         y:50,
         duration:.6,
         opacity:0,
         // delay:1,
         stagger:.14,
 })

 gsap.from('.img-innergroup img', {
    x:150,
    opacity:0,
 })

    </script>~
</body>
</html>
