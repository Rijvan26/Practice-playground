<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,body {
            height: 100%;
            width: 100%;
            background: #000;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 70px;
            text-transform: uppercase;
            overflow: hidden;
        }

        h1 span {
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1 >Sheryians</h1>


    <script>
     function breakText () {
         var h1 = document.querySelector("h1"); // ELEMENT
var text = h1.textContent;             // STRING

var textSplit = text.split("");
var halfvalue = textSplit.length/2
var clutter = "";

textSplit.forEach(function (e,idx) {
 
  
  if(idx<halfvalue){
    clutter += `<span class="a">${e}</span>`
  } else {
    clutter += `<span class="b">${e}</span>`
  }
});

console.log(clutter);

h1.innerHTML = clutter;
 
     }    

     breakText ()
        gsap.from (".a", {
            y:50,
            x:-50,
            opacity:0,
            duration:1,
            delay: 0.5,
            stagger:0.15
        })

         gsap.from (".b", {
            x:50,
            y:50,
            opacity:0,
            duration:1,
            delay: 0.5,
            stagger:-0.15
        })
    </script>
</body>
</html>
